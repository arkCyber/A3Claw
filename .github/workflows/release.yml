name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: openclaw-plus
            archive: openclaw-plus-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: openclaw-plus
            archive: openclaw-plus-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: openclaw-plus
            archive: openclaw-plus-macos-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: openclaw-plus.exe
            archive: openclaw-plus-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install WasmEdge (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -sSf https://raw.githubusercontent.com/WasmEdge/WasmEdge/master/utils/install.sh | bash -s -- -v 0.13.5
          echo "$HOME/.wasmedge/bin" >> $GITHUB_PATH
          echo "WASMEDGE_INCLUDE_DIR=$HOME/.wasmedge/include" >> $GITHUB_ENV
          echo "WASMEDGE_LIB_DIR=$HOME/.wasmedge/lib" >> $GITHUB_ENV

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libvulkan-dev \
            libgl1-mesa-dev pkg-config cmake \
            libfontconfig1-dev libfreetype6-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p openclaw-ui

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp config/default.toml dist/
          cp README.md dist/
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          Copy-Item config/default.toml dist/
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          generate_release_notes: true
