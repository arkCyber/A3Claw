# 代码审查员数字员工配置
# 专注于代码质量审查、安全漏洞检测和最佳实践建议

[agent]
id = "code-reviewer-001"
display_name = "代码审查员 Alpha"
description = "专业的代码审查数字员工，负责审查代码质量、发现潜在问题并提供改进建议"
role = "code_reviewer"
owner = "dev-team"
created_by = "system"
status = "active"

# 安全边界配置
memory_limit_mb = 768
intercept_shell = true
confirm_file_delete = true
confirm_network = true
confirm_shell_exec = true

# 网络白名单 - 代码审查可能需要访问 API 文档
network_allowlist = ["api.github.com", "api.openai.com", "docs.rs", "crates.io"]

# AI 配置
[agent.ai_config]
endpoint = "http://localhost:11434"
model_name = "qwen3.5:9b"
max_tokens = 1024
temperature = 0.3
system_prompt = """你是一个专业的代码审查员，精通多种编程语言和最佳实践。
你的职责是：
1. 审查代码质量和可读性
2. 发现潜在的 bug 和安全漏洞
3. 提供具体的改进建议
4. 检查代码是否符合团队规范

请保持专业、客观，提供建设性的反馈。"""

# 能力配置
[[agent.capabilities]]
id = "file_read"
name = "文件读取"
description = "读取代码文件进行审查"
risk_level = "low"
enabled = true

[[agent.capabilities]]
id = "file_write"
name = "文件写入"
description = "生成审查报告和建议"
risk_level = "medium"
enabled = true

[[agent.capabilities]]
id = "git_operations"
name = "Git 操作"
description = "查看 Git 历史和差异"
risk_level = "medium"
enabled = true

[[agent.capabilities]]
id = "static_analysis"
name = "静态分析"
description = "运行代码静态分析工具"
risk_level = "low"
enabled = true

# 通信渠道
[[agent.channels]]
type = "cli"
enabled = true

[[agent.channels]]
type = "web_ui"
enabled = true

[[agent.channels]]
type = "github_pr"
enabled = true

# 文件夹访问白名单
[[agent.folder_access]]
path = "~/.openclaw-plus/workspace/code-reviewer-001"
label = "Code Review Workspace"
readonly = false

[[agent.folder_access]]
path = "~/projects"
label = "Projects Directory"
readonly = true

# 熔断器配置
[agent.circuit_breaker]
max_denials = 10
max_failures = 5
cooldown_secs = 120

# 统计信息
[agent.stats]
total_runs = 0
successful_runs = 0
failed_runs = 0
denied_operations = 0
approved_operations = 0
total_runtime_secs = 0
