# 数据分析师数字员工配置
# 专注于数据分析、可视化和洞察报告生成

[agent]
id = "data-analyst-001"
display_name = "数据分析师 Insight"
description = "专业的数据分析数字员工，负责数据处理、统计分析和可视化报告生成"
role = "data_analyst"
owner = "data-team"
created_by = "system"
status = "active"

# 安全边界配置
memory_limit_mb = 1024
intercept_shell = true
confirm_file_delete = true
confirm_network = true
confirm_shell_exec = true

# 网络白名单 - 数据分析可能需要访问外部数据源
network_allowlist = [
    "api.openai.com",
    "api.github.com",
    "data.gov",
    "kaggle.com",
]

# AI 配置
[agent.ai_config]
endpoint = "http://localhost:11434"
model_name = "qwen3.5:9b"
max_tokens = 1024
temperature = 0.4
system_prompt = """你是一个专业的数据分析师，精通统计学、数据可视化和商业智能。
你的职责是：
1. 分析和处理各类数据
2. 发现数据中的模式和趋势
3. 生成清晰的可视化图表
4. 提供数据驱动的洞察和建议

请保持客观、准确，用数据说话。"""

# 能力配置
[[agent.capabilities]]
id = "file_read"
name = "文件读取"
description = "读取 CSV、JSON、Excel 等数据文件"
risk_level = "low"
enabled = true

[[agent.capabilities]]
id = "file_write"
name = "文件写入"
description = "生成分析报告和可视化图表"
risk_level = "medium"
enabled = true

[[agent.capabilities]]
id = "data_processing"
name = "数据处理"
description = "数据清洗、转换和聚合"
risk_level = "low"
enabled = true

[[agent.capabilities]]
id = "statistical_analysis"
name = "统计分析"
description = "运行统计分析和机器学习模型"
risk_level = "medium"
enabled = true

[[agent.capabilities]]
id = "visualization"
name = "数据可视化"
description = "生成图表和仪表板"
risk_level = "low"
enabled = true

# 通信渠道
[[agent.channels]]
type = "cli"
enabled = true

[[agent.channels]]
type = "web_ui"
enabled = true

[[agent.channels]]
type = "email"
enabled = true

# 文件夹访问白名单
[[agent.folder_access]]
path = "~/.openclaw-plus/workspace/data-analyst-001"
label = "Data Analysis Workspace"
readonly = false

[[agent.folder_access]]
path = "~/data"
label = "Data Directory"
readonly = true

# RAG 知识库文件夹
[[agent.rag_folders]]
path = "~/data/knowledge-base"
name = "Data Science Knowledge Base"

# 熔断器配置
[agent.circuit_breaker]
max_denials = 8
max_failures = 4
cooldown_secs = 90

# 统计信息
[agent.stats]
total_runs = 0
successful_runs = 0
failed_runs = 0
denied_operations = 0
approved_operations = 0
total_runtime_secs = 0
