# 报告生成器数字员工配置
# 专注于自动化报告生成、数据汇总和文档编写

[agent]
id = "report-generator-001"
display_name = "报告生成器 Scribe"
description = "专业的报告生成数字员工，负责自动化生成各类报告、总结和文档"
role = "report_generator"
owner = "operations-team"
created_by = "system"
status = "active"

# 安全边界配置
memory_limit_mb = 512
intercept_shell = true
confirm_file_delete = true
confirm_network = true
confirm_shell_exec = true

# 网络白名单
network_allowlist = [
    "api.openai.com",
    "api.github.com"
]

# AI 配置
[agent.ai_config]
endpoint = "http://localhost:11434"
model_name = "qwen2.5:0.5b"
max_tokens = 1024
temperature = 0.6
system_prompt = """你是一个专业的报告生成专家，精通各类商业报告、技术文档和总结撰写。
你的职责是：
1. 收集和整理数据信息
2. 生成结构化的报告文档
3. 创建清晰的总结和摘要
4. 确保报告格式规范、内容准确

请保持专业、简洁，注重可读性。"""

# 能力配置
[[agent.capabilities]]
id = "file_read"
name = "文件读取"
description = "读取数据源和模板文件"
risk_level = "low"
enabled = true

[[agent.capabilities]]
id = "file_write"
name = "文件写入"
description = "生成报告文档"
risk_level = "medium"
enabled = true

[[agent.capabilities]]
id = "data_aggregation"
name = "数据聚合"
description = "汇总和整理数据"
risk_level = "low"
enabled = true

[[agent.capabilities]]
id = "template_rendering"
name = "模板渲染"
description = "使用模板生成文档"
risk_level = "low"
enabled = true

[[agent.capabilities]]
id = "pdf_generation"
name = "PDF 生成"
description = "生成 PDF 格式报告"
risk_level = "medium"
enabled = true

# 通信渠道
[[agent.channels]]
type = "cli"
enabled = true

[[agent.channels]]
type = "web_ui"
enabled = true

[[agent.channels]]
type = "email"
enabled = true

# 文件夹访问白名单
[[agent.folder_access]]
path = "~/.openclaw-plus/workspace/report-generator-001"
label = "Report Generation Workspace"
readonly = false

[[agent.folder_access]]
path = "~/reports"
label = "Reports Output Directory"
readonly = false

[[agent.folder_access]]
path = "~/templates"
label = "Report Templates"
readonly = true

# 熔断器配置
[agent.circuit_breaker]
max_denials = 5
max_failures = 3
cooldown_secs = 60

# 统计信息
[agent.stats]
total_runs = 0
successful_runs = 0
failed_runs = 0
denied_operations = 0
approved_operations = 0
total_runtime_secs = 0
