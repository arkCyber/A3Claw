# 安全审计员数字员工配置
# 专注于安全漏洞扫描、合规性检查和安全策略审计

[agent]
id = "security-auditor-001"
display_name = "安全审计员 Guardian"
description = "专业的安全审计数字员工，负责扫描安全漏洞、检查合规性并提供安全加固建议"
role = "security_auditor"
owner = "security-team"
created_by = "system"
status = "active"

# 安全边界配置 - 安全审计员需要更高权限
memory_limit_mb = 1024
intercept_shell = true
confirm_file_delete = true
confirm_network = true
confirm_shell_exec = true

# 网络白名单 - 需要访问安全数据库和漏洞库
network_allowlist = [
    "nvd.nist.gov",
    "cve.mitre.org",
    "api.github.com",
    "api.openai.com",
    "rustsec.org"
]

# AI 配置
[agent.ai_config]
endpoint = "http://localhost:11434"
model_name = "qwen2.5:0.5b"
max_tokens = 1024
temperature = 0.2
system_prompt = """你是一个专业的安全审计员，精通网络安全、应用安全和系统安全。
你的职责是：
1. 扫描和识别安全漏洞
2. 检查代码和配置的安全性
3. 评估安全风险并提供缓解建议
4. 确保系统符合安全最佳实践

请保持严谨、细致，优先考虑安全性。"""

# 能力配置
[[agent.capabilities]]
id = "file_read"
name = "文件读取"
description = "读取配置文件和代码进行安全审计"
risk_level = "low"
enabled = true

[[agent.capabilities]]
id = "file_write"
name = "文件写入"
description = "生成安全审计报告"
risk_level = "medium"
enabled = true

[[agent.capabilities]]
id = "security_scan"
name = "安全扫描"
description = "运行安全扫描工具"
risk_level = "medium"
enabled = true

[[agent.capabilities]]
id = "vulnerability_check"
name = "漏洞检查"
description = "检查已知漏洞数据库"
risk_level = "low"
enabled = true

[[agent.capabilities]]
id = "network_scan"
name = "网络扫描"
description = "扫描网络端口和服务"
risk_level = "high"
enabled = false

# 通信渠道
[[agent.channels]]
type = "cli"
enabled = true

[[agent.channels]]
type = "web_ui"
enabled = true

[[agent.channels]]
type = "email"
enabled = true

# 文件夹访问白名单
[[agent.folder_access]]
path = "~/.openclaw-plus/workspace/security-auditor-001"
label = "Security Audit Workspace"
readonly = false

[[agent.folder_access]]
path = "~/projects"
label = "Projects Directory"
readonly = true

[[agent.folder_access]]
path = "/etc"
label = "System Configuration"
readonly = true

# 熔断器配置
[agent.circuit_breaker]
max_denials = 15
max_failures = 5
cooldown_secs = 180

# 统计信息
[agent.stats]
total_runs = 0
successful_runs = 0
failed_runs = 0
denied_operations = 0
approved_operations = 0
total_runtime_secs = 0
