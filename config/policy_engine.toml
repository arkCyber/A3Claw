# OpenClaw+ Policy Engine Configuration
#
# Defines security policies, rules, and enforcement mechanisms.
# Implements aerospace-grade security policy management.
#
# Version: 1.0.0
# Standard: Aerospace-grade security

[engine]
name = "OpenClaw+ Policy Engine"
version = "1.0.0"
enabled = true
default_action = "deny"  # deny, allow, audit
audit_all = true

# Logging configuration
[engine.logging]
enabled = true
level = "info"  # debug, info, warn, error
log_file = "/var/log/openclaw/policy.log"
max_log_size_mb = 100
rotate_logs = true

# Performance settings
[engine.performance]
cache_enabled = true
cache_ttl_sec = 300
max_cache_entries = 1000
parallel_evaluation = true

# ============================================================================
# File System Policies
# ============================================================================

[[policies]]
id = "fs_read_policy"
name = "File System Read Policy"
description = "Controls file system read operations"
enabled = true
priority = 100

[policies.conditions]
operation = "fs.read"
resource_type = "file"

[policies.rules]
# Allow reading from allowed paths
allow_patterns = [
    "/tmp/**",
    "/data/**",
    "/workspace/**",
    "*.txt",
    "*.json",
    "*.log"
]

# Deny reading from sensitive paths
deny_patterns = [
    "/etc/**",
    "/sys/**",
    "/proc/**",
    "/root/**",
    "*.key",
    "*.pem",
    "*password*",
    "*secret*"
]

[policies.actions]
on_allow = "log"
on_deny = "block_and_log"
on_error = "deny_and_log"

# ============================================================================

[[policies]]
id = "fs_write_policy"
name = "File System Write Policy"
description = "Controls file system write operations"
enabled = true
priority = 100

[policies.conditions]
operation = "fs.write"
resource_type = "file"

[policies.rules]
allow_patterns = [
    "/tmp/**",
    "/data/**",
    "/logs/**",
    "*.txt",
    "*.json",
    "*.log",
    "*.csv"
]

deny_patterns = [
    "/etc/**",
    "/sys/**",
    "/proc/**",
    "/root/**",
    "/usr/**",
    "*.exe",
    "*.sh",
    "*.bat"
]

# Size limits
max_file_size_mb = 10

[policies.actions]
on_allow = "log"
on_deny = "block_and_log"
on_error = "deny_and_log"

# ============================================================================

[[policies]]
id = "fs_delete_policy"
name = "File System Delete Policy"
description = "Controls file system delete operations"
enabled = true
priority = 100

[policies.conditions]
operation = "fs.delete"
resource_type = "file"

[policies.rules]
# Very restrictive - only allow deleting in specific directories
allow_patterns = [
    "/tmp/**",
    "/data/temp/**"
]

deny_patterns = [
    "/**"  # Deny everything else
]

[policies.actions]
on_allow = "log"
on_deny = "block_and_log"
on_error = "deny_and_log"

# ============================================================================
# Network Policies
# ============================================================================

[[policies]]
id = "net_http_policy"
name = "HTTP Network Policy"
description = "Controls HTTP network operations"
enabled = true
priority = 100

[policies.conditions]
operation = "net.http"
resource_type = "network"

[policies.rules]
# Allowed domains
allowed_domains = [
    "api.github.com",
    "httpbin.org",
    "jsonplaceholder.typicode.com"
]

# Blocked domains
blocked_domains = [
    "*.malware.com",
    "*.phishing.com"
]

# Allowed HTTP methods
allowed_methods = ["GET", "POST", "PUT", "DELETE"]

# Request limits
max_request_size_mb = 5
max_response_size_mb = 10
timeout_sec = 30

[policies.actions]
on_allow = "log"
on_deny = "block_and_log"
on_error = "deny_and_log"

# ============================================================================

[[policies]]
id = "net_https_policy"
name = "HTTPS Network Policy"
description = "Controls HTTPS network operations"
enabled = true
priority = 100

[policies.conditions]
operation = "net.https"
resource_type = "network"

[policies.rules]
allowed_domains = [
    "api.github.com",
    "api.production.example.com"
]

blocked_domains = []

allowed_methods = ["GET", "POST", "PUT", "DELETE"]

# TLS requirements
require_tls = true
min_tls_version = "1.2"
verify_certificates = true

max_request_size_mb = 5
max_response_size_mb = 10
timeout_sec = 30

[policies.actions]
on_allow = "log"
on_deny = "block_and_log"
on_error = "deny_and_log"

# ============================================================================
# Process Policies
# ============================================================================

[[policies]]
id = "process_spawn_policy"
name = "Process Spawn Policy"
description = "Controls process spawning operations"
enabled = true
priority = 100

[policies.conditions]
operation = "process.spawn"
resource_type = "process"

[policies.rules]
# Very restrictive - deny all by default
allow_patterns = []
deny_patterns = ["**"]

[policies.actions]
on_allow = "log"
on_deny = "block_and_log"
on_error = "deny_and_log"

# ============================================================================
# Resource Limit Policies
# ============================================================================

[[policies]]
id = "memory_limit_policy"
name = "Memory Limit Policy"
description = "Enforces memory usage limits"
enabled = true
priority = 50

[policies.conditions]
resource_type = "memory"

[policies.rules]
max_memory_mb = 512
max_stack_size_mb = 8
check_interval_sec = 10

[policies.actions]
on_exceed = "terminate_and_log"
on_warning = "log"

# ============================================================================

[[policies]]
id = "cpu_limit_policy"
name = "CPU Limit Policy"
description = "Enforces CPU usage limits"
enabled = true
priority = 50

[policies.conditions]
resource_type = "cpu"

[policies.rules]
max_cpu_percent = 80
max_execution_time_sec = 300
check_interval_sec = 5

[policies.actions]
on_exceed = "terminate_and_log"
on_warning = "log"

# ============================================================================
# Audit Policies
# ============================================================================

[[policies]]
id = "audit_all_policy"
name = "Audit All Operations Policy"
description = "Audits all security-relevant operations"
enabled = true
priority = 10

[policies.conditions]
operation = "*"

[policies.rules]
audit_operations = [
    "fs.read",
    "fs.write",
    "fs.delete",
    "net.http",
    "net.https",
    "process.spawn"
]

log_level = "info"
include_stack_trace = false
include_parameters = true

[policies.actions]
on_any = "audit_log"

# ============================================================================
# Rate Limiting Policies
# ============================================================================

[[policies]]
id = "rate_limit_policy"
name = "Rate Limiting Policy"
description = "Prevents resource exhaustion through rate limiting"
enabled = true
priority = 75

[policies.conditions]
resource_type = "rate_limit"

[policies.rules]
# File system operations
fs_read_per_sec = 100
fs_write_per_sec = 50
fs_delete_per_sec = 10

# Network operations
net_requests_per_sec = 10
net_requests_per_min = 300

# Window for rate limiting
window_sec = 60

[policies.actions]
on_exceed = "throttle_and_log"
on_warning = "log"

# ============================================================================
# Emergency Policies
# ============================================================================

[[policies]]
id = "emergency_shutdown_policy"
name = "Emergency Shutdown Policy"
description = "Triggers emergency shutdown on critical violations"
enabled = true
priority = 1000

[policies.conditions]
severity = "critical"

[policies.rules]
trigger_on = [
    "memory_exhaustion",
    "cpu_exhaustion",
    "security_violation",
    "policy_violation_threshold"
]

violation_threshold = 10
threshold_window_sec = 60

[policies.actions]
on_trigger = "emergency_shutdown"
notify_admin = true
save_state = true
