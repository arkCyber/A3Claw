[package]
name = "skill-encode"
version = "0.1.0"
edition = "2021"
description = "OpenClaw+ encode skill plugin — base64/hex/url/json/html (wasm32-wasip1)"

[lib]
crate-type = ["cdylib"]
name = "skill_encode"

[dependencies]
openclaw-plugin-sdk = { path = "../../plugin-sdk" }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
panic = "abort"
