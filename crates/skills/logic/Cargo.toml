[package]
name = "skill-logic"
version = "0.1.0"
edition = "2021"
description = "OpenClaw+ logic skill plugin — boolean ops, conditionals, comparisons (wasm32-wasip1)"

[lib]
crate-type = ["cdylib"]
name = "skill_logic"

[dependencies]
openclaw-plugin-sdk = { path = "../../plugin-sdk" }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
panic = "abort"
