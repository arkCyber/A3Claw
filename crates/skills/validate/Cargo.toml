[package]
name = "skill-validate"
version = "0.1.0"
edition = "2021"
description = "OpenClaw+ validate skill plugin — email/url/phone/credit-card validation (wasm32-wasip1)"

[lib]
crate-type = ["cdylib"]
name = "skill_validate"

[dependencies]
openclaw-plugin-sdk = { path = "../../plugin-sdk" }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
panic = "abort"
