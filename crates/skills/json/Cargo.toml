[package]
name = "skill-json"
version = "0.1.0"
edition = "2021"
description = "OpenClaw+ json skill plugin — parse/format/validate/get/set/merge/diff (wasm32-wasip1)"

[lib]
crate-type = ["cdylib"]
name = "skill_json"

[dependencies]
openclaw-plugin-sdk = { path = "../../plugin-sdk" }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
panic = "abort"
