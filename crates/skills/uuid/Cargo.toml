[package]
name = "skill-uuid"
version = "0.1.0"
edition = "2021"
description = "OpenClaw+ uuid skill plugin — v4/v5/validate/parse/nil (wasm32-wasip1)"

[lib]
crate-type = ["cdylib"]
name = "skill_uuid"

[dependencies]
openclaw-plugin-sdk = { path = "../../plugin-sdk" }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
panic = "abort"
