[package]
name = "skill-hash"
version = "0.1.0"
edition = "2021"
description = "OpenClaw+ hash skill plugin — md5/sha1/sha256/sha512/hmac (wasm32-wasip1)"

[lib]
crate-type = ["cdylib"]
name = "skill_hash"

[dependencies]
openclaw-plugin-sdk = { path = "../../plugin-sdk" }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
panic = "abort"
